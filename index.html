<!-- Hero Section Container with Background Image -->
<!-- REPLACE 'your-image-url-here.jpg' with the actual path to your background image -->
<section class="relative min-h-[70vh] flex items-center justify-center bg-[#0B0F19] text-white overflow-hidden px-6 py-20 font-sans bg-cover bg-center bg-no-repeat" 
         style="background-image: url('your-image-url-here.jpg');">
  
  <!-- Premium Dark Gradient Overlay (Ensures text contrast and high-end aesthetic) -->
  <div class="absolute inset-0 bg-gradient-to-b from-[#0B0F19]/90 via-[#0B0F19]/80 to-[#0B0F19]/95 z-0"></div>
  
  <!-- Subtle Glowing Mesh Accents (Blends with the background image beautifully) -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
  <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-cyan-500/10 rounded-full blur-[100px] pointer-events-none z-0"></div>

  <!-- Content Wrapper -->
  <div class="relative z-10 max-w-4xl mx-auto text-center space-y-8">

    <!-- Main Headline (H1) -->
    <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold tracking-tight text-white leading-[1.15]">
      Expert Support You Can <span class="bg-gradient-to-r from-blue-400 via-cyan-400 to-blue-500 bg-clip-text text-transparent">Rely On</span>
    </h1>

    <!-- Subheadline / Value Prop -->
    <p class="max-w-2xl mx-auto text-base sm:text-lg md:text-xl text-gray-300 leading-relaxed font-light">
      Quality Equipment. Competitive Pricing. Dedicated Customer Service.<br class="hidden sm:inline" /> 
      Discover our advanced standalone duplication environments.
    </p>

    <!-- High-Converting CTA Button Container -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4">
      
      <!-- Primary Magnetic Button (Shop Catalog) -->
      <a href="#catalog" class="group relative inline-flex items-center justify-center gap-2 px-8 py-4 bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-semibold text-base rounded-xl transition-all duration-300 transform hover:-translate-y-1 hover:shadow-[0_0_30px_rgba(37,99,235,0.5)] active:scale-95 w-full sm:w-auto overflow-hidden">
        <!-- Internal gleam effect on hover -->
        <span class="absolute inset-0 w-full h-full bg-gradient-to-r from-white/0 via-white/20 to-white/0 -translate-x-full group-hover:translate-x-full transition-transform duration-1000 ease-out"></span>
        
        <span>Shop Catalog</span>
        
        <!-- Interactive slide arrow icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform transition-transform duration-300 group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </a>

      <!-- Secondary Ghost Button (Contact Us) -->
      <a href="#contact" class="inline-flex items-center justify-center px-8 py-4 bg-white/5 hover:bg-white/10 text-white font-medium text-base rounded-xl border border-white/10 hover:border-white/20 transition-all duration-200 backdrop-blur-md w-full sm:w-auto active:scale-98">
        Contact Us
      </a>
      
    </div>

    <!-- Micro-Social Proof -->
    <div class="pt-2 text-xs text-gray-400 tracking-wide font-medium flex items-center justify-center gap-1.5">
      <div class="flex text-yellow-500 gap-0.5">★ ★ ★ ★ ★</div>
      <span>Trusted industry grade performance</span>
    </div>

  </div>
</section>
